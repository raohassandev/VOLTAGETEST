services:
  web:
    build:
      context: ../web-dashboard
    environment:
      UPS_AUTH_USERNAME: admin
      UPS_AUTH_PASSWORD: change-this-password
      UPS_AUTH_TOKEN: replace-with-a-long-random-session-token
    ports:
      - "3000:3000"
    volumes:
      - web_data:/app/data
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwords:/mosquitto/config/passwords:ro
      - ./mosquitto/acl:/mosquitto/config/acl:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  web_data:

